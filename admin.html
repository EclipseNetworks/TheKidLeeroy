<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THEKIDLEEROY | Secure Commander</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Syncopate:wght@700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6">

    <div id="auth-wall" class="fixed inset-0 z-[10000] bg-[#020617] flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-10 rounded-[2.5rem] text-center">
            <h1 class="syncopate text-2xl text-emerald-500 mb-2">Access Portal</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] text-white/20 mb-10">THEKIDLEEROY System Command</p>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Admin Email" class="w-full bg-black/50 border border-white/10 rounded-2xl p-5 outline-none focus:border-emerald-500 transition-all">
                <input type="password" id="password" placeholder="Password (Optional for Magic Link)" class="w-full bg-black/50 border border-white/10 rounded-2xl p-5 outline-none focus:border-emerald-500 transition-all">
                
                <button id="loginBtn" class="w-full py-5 bg-emerald-600 text-black font-black rounded-2xl hover:bg-emerald-400 transition-all uppercase text-xs tracking-widest">Sign In</button>
                
                <div class="flex items-center gap-4 text-white/10 py-2">
                    <div class="h-px bg-white/10 flex-grow"></div>
                    <span class="text-[9px] font-bold">OR</span>
                    <div class="h-px bg-white/10 flex-grow"></div>
                </div>

                <button id="magicBtn" class="w-full py-5 border border-white/10 rounded-2xl font-bold hover:bg-white hover:text-black transition-all text-xs tracking-widest">Send Magic Link</button>
            </div>
            <p id="authStatus" class="mt-6 text-xs text-red-400 font-mono italic"></p>
        </div>
    </div>

    <div id="main-admin" class="max-w-6xl mx-auto hidden">
        <header class="flex justify-between items-center mb-12 border-b border-white/5 pb-8">
            <div>
                <h1 class="syncopate text-3xl font-black italic">COMMAND<span class="text-emerald-500">ER</span></h1>
                <p id="userDisplay" class="text-[10px] text-white/30 font-mono uppercase mt-1"></p>
            </div>
            <button id="logoutBtn" class="px-6 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold hover:bg-red-500/20 hover:text-red-500 transition-all">TERMINATE SESSION</button>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="glass p-8 rounded-[2rem]">
                    <h2 class="text-xs font-black uppercase text-white/20 mb-8 tracking-widest">Global Live Content</h2>
                    <form id="contentForm" class="space-y-6">
                        <input type="text" id="serverName" placeholder="Server Name" class="w-full bg-black/30 border border-white/5 rounded-xl p-5">
                        <textarea id="heroDesc" placeholder="Hero Description" class="w-full bg-black/30 border border-white/5 rounded-xl p-5 h-32"></textarea>
                        <div class="flex gap-4">
                            <input type="number" id="activeP" placeholder="Active" class="w-1/2 bg-black/30 border border-white/5 rounded-xl p-5">
                            <input type="number" id="maxP" placeholder="Limit" class="w-1/2 bg-black/30 border border-white/5 rounded-xl p-5">
                        </div>
                        <button type="submit" class="w-full py-5 bg-emerald-600 text-black font-black rounded-xl">SYNC LIVE DATA</button>
                    </form>
                </div>
            </div>

            <div class="space-y-8">
                <div class="glass p-8 rounded-[2rem] border-t-2 border-red-500/20">
                    <h2 class="text-xs font-black uppercase text-red-500 mb-6 tracking-widest">Security Override</h2>
                    <button id="lockdownBtn" class="w-full py-6 rounded-xl border-2 border-red-500 text-red-500 font-black hover:bg-red-500 hover:text-white transition-all">ACTIVATE LOCKDOWN</button>
                    <p class="text-[10px] text-white/20 mt-4 text-center">Forces maintenance screen for all users.</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBA_2B7LNpeX9oKXNYy2bshgbqyQspv7js",
            authDomain: "thekidleeroy-7b866.firebaseapp.com",
            projectId: "thekidleeroy-7b866",
            storageBucket: "thekidleeroy-7b866.firebasestorage.app",
            messagingSenderId: "11424786498",
            appId: "1:11424786498:web:a69be8cc44ac30aa1165db"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- 1. AUTH LOGIC ---

        // Handle Password Login
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                document.getElementById('authStatus').innerText = "Auth Failed: " + err.message;
            }
        };

        // Handle Magic Link (Passwordless)
        document.getElementById('magicBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            try {
                await sendSignInLinkToEmail(auth, email, {
                    url: window.location.href, // Redirect back here
                    handleCodeInApp: true
                });
                window.localStorage.setItem('emailForSignIn', email);
                document.getElementById('authStatus').innerText = "Check your inbox for the link!";
                document.getElementById('authStatus').style.color = "#10b981";
            } catch (err) {
                document.getElementById('authStatus').innerText = err.message;
            }
        };

        // Check if user is landing from a Magic Link
        if (isSignInWithEmailLink(auth, window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Confirm your email:');
            signInWithEmailLink(auth, email, window.location.href)
                .then(() => window.localStorage.removeItem('emailForSignIn'))
                .catch(err => alert(err.message));
        }

        // --- 2. MAIN APP LOGIC (Only runs when logged in) ---

        onAuthStateChanged(auth, (user) => {
            const wall = document.getElementById('auth-wall');
            const admin = document.getElementById('main-admin');
            
            if (user) {
                wall.classList.add('hidden');
                admin.classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `SESSION: ${user.email}`;
                initDatabase();
            } else {
                wall.classList.remove('hidden');
                admin.classList.add('hidden');
            }
        });

        function initDatabase() {
            const siteRef = ref(db, 'siteData');

            onValue(siteRef, (snap) => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('serverName').value = data.serverName;
                document.getElementById('heroDesc').value = data.heroDesc;
                document.getElementById('activeP').value = data.activePlayers;
                document.getElementById('maxP').value = data.maxPlayers;

                const lBtn = document.getElementById('lockdownBtn');
                if (data.lockdown) {
                    lBtn.innerText = "DEACTIVATE LOCKDOWN";
                    lBtn.classList.add('bg-red-500', 'text-white');
                } else {
                    lBtn.innerText = "ACTIVATE LOCKDOWN";
                    lBtn.classList.remove('bg-red-500', 'text-white');
                }
            });

            document.getElementById('contentForm').onsubmit = (e) => {
                e.preventDefault();
                update(siteRef, {
                    serverName: document.getElementById('serverName').value,
                    heroDesc: document.getElementById('heroDesc').value,
                    activePlayers: parseInt(document.getElementById('activeP').value),
                    maxPlayers: parseInt(document.getElementById('maxP').value)
                });
            };

            document.getElementById('lockdownBtn').onclick = () => {
                const isLocked = document.getElementById('lockdownBtn').innerText.includes("DEACTIVATE");
                update(siteRef, { lockdown: !isLocked });
            };
        }

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
