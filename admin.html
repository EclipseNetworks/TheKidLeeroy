<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THEKIDLEEROY | System Commander</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Syncopate:wght@700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden { display: none !important; }
        input, textarea { transition: all 0.3s ease; }
        input:focus, textarea:focus { border-color: #10b981 !important; outline: none; background: rgba(0,0,0,0.7) !important; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="auth-wall" class="fixed inset-0 z-[10000] bg-[#020617] flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-10 rounded-[2.5rem] text-center border-t-2 border-emerald-500/20">
            <h1 class="syncopate text-2xl text-emerald-500 mb-2">Access Portal</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] text-white/20 mb-10">Neural Identity Verification</p>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Admin Email" class="w-full bg-black/50 border border-white/10 rounded-2xl p-5">
                <input type="password" id="password" placeholder="Password (Optional for Magic Link)" class="w-full bg-black/50 border border-white/10 rounded-2xl p-5">
                
                <button id="loginBtn" class="w-full py-5 bg-emerald-600 text-black font-black rounded-2xl hover:bg-emerald-400 transition-all uppercase text-xs tracking-widest">Sign In</button>
                
                <div class="flex items-center gap-4 text-white/10 py-2">
                    <div class="h-px bg-white/10 flex-grow"></div>
                    <span class="text-[9px] font-bold">OR</span>
                    <div class="h-px bg-white/10 flex-grow"></div>
                </div>

                <button id="magicBtn" class="w-full py-5 border border-white/10 rounded-2xl font-bold hover:bg-white hover:text-black transition-all text-xs tracking-widest">Send Magic Link</button>
            </div>
            <p id="authStatus" class="mt-6 text-xs text-red-400 font-mono italic"></p>
        </div>
    </div>

    <div id="main-admin" class="max-w-6xl mx-auto hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 border-b border-white/5 pb-8 gap-6">
            <div>
                <h1 class="syncopate text-3xl font-black italic">COMMAND<span class="text-emerald-500">ER</span></h1>
                <p id="userDisplay" class="text-[10px] text-white/30 font-mono uppercase mt-1"></p>
            </div>
            <button id="logoutBtn" class="px-6 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest">Terminate Session</button>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="glass p-8 rounded-[2rem] border-l-4 border-emerald-500">
                    <h2 class="text-xs font-black uppercase text-white/20 mb-8 tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        Live Content Management
                    </h2>
                    
                    <form id="contentForm" class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-white/40 uppercase ml-2">Server Brand Name</label>
                            <input type="text" id="serverName" class="w-full bg-black/30 border border-white/5 rounded-xl p-5 font-bold">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-white/40 uppercase ml-2">Hero Tagline</label>
                            <textarea id="heroDesc" class="w-full bg-black/30 border border-white/5 rounded-xl p-5 h-32 leading-relaxed text-white/70"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-white/40 uppercase ml-2">Active Users</label>
                                <input type="number" id="activeP" class="w-full bg-black/30 border border-white/5 rounded-xl p-5 text-emerald-500 font-black">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-white/40 uppercase ml-2">Capacity Limit</label>
                                <input type="number" id="maxP" class="w-full bg-black/30 border border-white/5 rounded-xl p-5 text-white/30 font-black">
                            </div>
                        </div>

                        <button type="submit" id="syncBtn" class="w-full py-6 bg-emerald-600 text-black font-black rounded-2xl hover:bg-emerald-400 shadow-lg shadow-emerald-900/20 transition-all transform active:scale-95 uppercase tracking-widest text-sm">
                            Push Live Update
                        </button>
                    </form>
                </div>
            </div>

            <div class="space-y-8">
                <div class="glass p-8 rounded-[2rem] border-t-4 border-red-600">
                    <h2 class="text-xs font-black uppercase text-red-500 mb-6 tracking-widest">Protocol: Lockdown</h2>
                    <p class="text-[10px] text-white/30 mb-8 leading-relaxed italic">Instantly divert all frontend traffic to the maintenance interface. Use only in emergencies.</p>
                    <button id="lockdownBtn" class="w-full py-6 rounded-2xl border-2 border-red-500 text-red-500 font-black hover:bg-red-500 hover:text-white transition-all duration-500 uppercase tracking-tighter text-lg">
                        Engage Lockdown
                    </button>
                </div>
                
                <div class="glass p-6 rounded-2xl border border-white/5">
                    <p class="text-[9px] font-mono text-white/20 uppercase tracking-widest text-center">System v4.0.0-PROD</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBA_2B7LNpeX9oKXNYy2bshgbqyQspv7js",
            authDomain: "thekidleeroy-7b866.firebaseapp.com",
            projectId: "thekidleeroy-7b866",
            storageBucket: "thekidleeroy-7b866.firebasestorage.app",
            messagingSenderId: "11424786498",
            appId: "1:11424786498:web:a69be8cc44ac30aa1165db",
            databaseURL: "https://thekidleeroy-7b866-default-rtdb.firebaseio.com" // Ensure this is correct
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- AUTH FLOW ---
        const loginBtn = document.getElementById('loginBtn');
        const magicBtn = document.getElementById('magicBtn');
        const authStatus = document.getElementById('authStatus');

        loginBtn.onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) { authStatus.innerText = err.message; }
        };

        magicBtn.onclick = async () => {
            const email = document.getElementById('email').value;
            try {
                await sendSignInLinkToEmail(auth, email, {
                    url: window.location.href,
                    handleCodeInApp: true
                });
                window.localStorage.setItem('emailForSignIn', email);
                authStatus.innerText = "Link sent! Check your email.";
                authStatus.style.color = "#10b981";
            } catch (err) { authStatus.innerText = err.message; }
        };

        if (isSignInWithEmailLink(auth, window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Confirm email:');
            signInWithEmailLink(auth, email, window.location.href)
                .then(() => window.localStorage.removeItem('emailForSignIn'))
                .catch(err => alert(err.message));
        }

        // --- APP STATE CONTROL ---
        onAuthStateChanged(auth, (user) => {
            const wall = document.getElementById('auth-wall');
            const admin = document.getElementById('main-admin');
            if (user) {
                wall.classList.add('hidden');
                admin.classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `SECURE SESSION: ${user.email}`;
                startLiveSync();
            } else {
                wall.classList.remove('hidden');
                admin.classList.add('hidden');
            }
        });

        // --- DATABASE LOGIC ---
        function startLiveSync() {
            const siteRef = ref(db, 'siteData');
            const syncBtn = document.getElementById('syncBtn');

            // 1. Initial Data Fetch (Fill the inputs)
            onValue(siteRef, (snap) => {
                const data = snap.val();
                if (!data) return;
                document.getElementById('serverName').value = data.serverName || "";
                document.getElementById('heroDesc').value = data.heroDesc || "";
                document.getElementById('activeP').value = data.activePlayers || 0;
                document.getElementById('maxP').value = data.maxPlayers || 0;

                const lBtn = document.getElementById('lockdownBtn');
                if (data.lockdown) {
                    lBtn.innerText = "DEACTIVATE LOCKDOWN";
                    lBtn.classList.add('bg-red-600', 'text-white');
                } else {
                    lBtn.innerText = "ENGAGE LOCKDOWN";
                    lBtn.classList.remove('bg-red-600', 'text-white');
                }
            });

            // 2. THE FIX: Sync Button Handler
            document.getElementById('contentForm').onsubmit = async (e) => {
                e.preventDefault(); // Stop page reload
                syncBtn.innerText = "SYNCING...";
                syncBtn.disabled = true;

                try {
                    await update(siteRef, {
                        serverName: document.getElementById('serverName').value,
                        heroDesc: document.getElementById('heroDesc').value,
                        activePlayers: Number(document.getElementById('activeP').value),
                        maxPlayers: Number(document.getElementById('maxP').value)
                    });
                    syncBtn.innerText = "SUCCESS! DATA PUSHED";
                    setTimeout(() => { 
                        syncBtn.innerText = "PUSH LIVE UPDATE";
                        syncBtn.disabled = false;
                    }, 2000);
                } catch (err) {
                    alert("Sync Error: " + err.message);
                    syncBtn.innerText = "PUSH LIVE UPDATE";
                    syncBtn.disabled = false;
                }
            };

            // 3. Lockdown Toggle
            document.getElementById('lockdownBtn').onclick = () => {
                const isCurrentlyLocked = document.getElementById('lockdownBtn').innerText.includes("DEACTIVATE");
                update(siteRef, { lockdown: !isCurrentlyLocked });
            };
        }

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
