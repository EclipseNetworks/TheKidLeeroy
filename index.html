<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THEKIDLEEROY // MASTER-CORE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#10b981', 
              secondary: '#22d3ee',
              tertiary: '#0ea5e9',
              dark: '#020617',
              'card-bg': 'rgba(15, 23, 42, 0.6)'
            },
            fontFamily: { sans: ['Montserrat', 'sans-serif'] }
          }
        }
      }
    </script>

    <style>
        /* Optimized Rendering for Large Files */
        body { background: #020617; color: white; scroll-behavior: smooth; }
        
        .bento-master {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: minmax(100px, auto);
            gap: 1.5rem;
        }

        .glass-module {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .glass-module:hover {
            border-color: #10b981;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.1);
        }

        /* High-Performance Animations */
        .reveal-on-scroll { opacity: 0; transform: translateY(30px); transition: 0.8s all ease-out; }
        .reveal-on-scroll.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <canvas id="neural-bg" class="fixed inset-0 z-[-1] opacity-30"></canvas>

    <nav class="fixed w-full z-[999] px-6 py-8">
        <div class="max-w-7xl mx-auto glass-module px-8 py-4 flex justify-between items-center border-white/10">
            <div class="text-xl font-black italic tracking-tighter uppercase">TK<span class="text-primary">.L</span></div>
            <div id="nav-links" class="hidden md:flex gap-10 text-[10px] font-bold tracking-[0.4em] uppercase opacity-60">
                </div>
            <div class="status-indicator flex items-center gap-2">
                <div class="h-2 w-2 bg-primary rounded-full animate-pulse"></div>
                <span class="text-[9px] font-bold text-primary">CORE ACTIVE</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-40 pb-20">
        <div class="bento-master" id="content-engine">
            </div>
    </main>

    <script>
        /**
         * 2000+ LINE SCALABILITY LOGIC
         * This engine allows you to store your site sections as "Modules"
         */
        const LeeroyEngine = {
            modules: [
                {
                    id: 'hero',
                    size: 'col-span-12 row-span-4',
                    content: `
                        <div class="p-12 flex flex-col justify-center h-full">
                            <h1 class="text-8xl font-black tracking-tighter mb-6 uppercase">The Kid <br><span class="text-primary">Leeroy.</span></h1>
                            <p class="text-zinc-500 text-xl max-w-xl">Multidisciplinary Digital Architect.</p>
                        </div>
                    `
                },
                {
                    id: 'stats',
                    size: 'md:col-span-4 row-span-2',
                    content: `
                        <div class="p-8 h-full flex flex-col justify-center">
                            <div class="text-5xl font-black mb-2">298+</div>
                            <div class="text-primary text-[10px] font-bold tracking-widest uppercase">Resources Optimized</div>
                        </div>
                    `
                },
                // Add hundreds of modules here...
            ],

            init() {
                const container = document.getElementById('content-engine');
                this.modules.forEach(mod => {
                    const el = document.createElement('div');
                    el.className = `glass-module ${mod.size} reveal-on-scroll`;
                    el.innerHTML = mod.content;
                    container.appendChild(el);
                });
                this.startAnimations();
            },

            startAnimations() {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('active');
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
            }
        };

        window.onload = () => LeeroyEngine.init();
    </script>
</body>
</html>
