<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // C2_ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ec4899; /* Pink neon from your code */
            --secondary: #0ea5e9; /* Blue neon */
            --bg: #050811;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 100;
            pointer-events: none;
        }

        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.02);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 2rem;
            z-index: 10;
        }

        .kernel-frame {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Glass Kernel from your code */
        .glass-kernel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 3rem;
            padding: 5rem;
            text-align: center;
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
        }

        .main-time {
            font-family: 'Syncopate', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 1;
            background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: var(--primary);
            color: black;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .telemetry-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(5, 8, 17, 0.8) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="vignette"></div>

    <aside class="sidebar">
        <div class="mb-10">
            <h2 class="font-bold text-[10px] text-primary tracking-[0.4em] uppercase mb-1">Xclipse_C2</h2>
            <p class="text-[8px] opacity-30">UPLINK_STATUS: NOMINAL</p>
        </div>

        <nav class="flex-1 space-y-6">
            <div>
                <p class="text-[9px] opacity-20 uppercase font-bold tracking-widest mb-3">System Health</p>
                <div class="telemetry-row"><span>CPU_KERNEL</span><span class="text-white">12%</span></div>
                <div class="telemetry-row"><span>MEM_RESERVE</span><span class="text-white">4.2GB</span></div>
                <div class="telemetry-row"><span>NET_LATENCY</span><span id="latency">-- ms</span></div>
            </div>

            <div>
                <p class="text-[9px] opacity-20 uppercase font-bold tracking-widest mb-3">Network Nodes</p>
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-[10px]">ADELAIDE_UPLINK</span>
                </div>
                <div class="flex items-center gap-2 opacity-40">
                    <div class="w-1.5 h-1.5 rounded-full bg-white/20"></div>
                    <span class="text-[10px]">SYDNEY_MIRROR</span>
                </div>
            </div>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/5">
            <p class="text-[8px] opacity-20">© 2026 TERMINAL_v4.2</p>
        </div>
    </aside>

    <main class="kernel-frame">
        <div class="glass-kernel" id="kernel">
            <div class="status-badge">Temporal_Engine_v1</div>
            
            <div class="flex items-baseline justify-center gap-4">
                <h1 class="main-time" id="bt-time">00:00:00</h1>
                <span class="font-display italic text-3xl text-white/20" id="bt-ampm">--</span>
            </div>

            <div class="mt-10 flex flex-col items-center">
                <p class="text-[10px] tracking-[1.5em] text-white/30 uppercase mb-4">Bordertown // South Australia</p>
                <div class="w-64 h-[1px] bg-white/5 relative">
                    <div class="absolute inset-0 bg-primary w-1/3" id="progress"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const timeEl = document.getElementById('bt-time');
        const ampmEl = document.getElementById('bt-ampm');
        const progressEl = document.getElementById('progress');
        const latencyEl = document.getElementById('latency');

        function update() {
            const now = new Date();
            
            // Time logic for Australia/Adelaide
            const timeStr = now.toLocaleTimeString('en-AU', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', 
                hour12: true, timeZone: 'Australia/Adelaide' 
            });

            const [time, ampm] = timeStr.split(' ');
            timeEl.innerText = time;
            ampmEl.innerText = ampm.toUpperCase();

            // Latency Simulation
            latencyEl.innerText = `${Math.floor(Math.random() * 15 + 8)}ms`;

            // Progress bar (Percent of day passed)
            const secondsPassed = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
            const dayPercent = (secondsPassed / 86400) * 100;
            progressEl.style.width = `${dayPercent}%`;

            requestAnimationFrame(update);
        }

        // Mouse Reactivity for the Kernel
        document.addEventListener('mousemove', (e) => {
            const kernel = document.getElementById('kernel');
            const x = (window.innerWidth / 2 - e.clientX) / 50;
            const y = (window.innerHeight / 2 - e.clientY) / 50;
            kernel.style.transform = `rotateX(${y}deg) rotateY(${-x}deg)`;
        });

        update();
    </script>
</body>
</html>
