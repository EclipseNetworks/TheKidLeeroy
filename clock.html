<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINETIC // DIGITAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;900&family=Syncopate:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --bg: #020617;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        /* Ambient Scanning Grid */
        .scan-grid {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
        }

        /* The Clock Chassis */
        .clock-chassis {
            position: relative;
            padding: 4rem 6rem;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 3rem;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.2s ease-out;
        }

        .time-wrapper {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            transform: translateZ(50px);
        }

        .digits {
            font-family: 'Syncopate', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.05em;
            background: linear-gradient(to bottom, #fff 30%, rgba(255,255,255,0.2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
        }

        .seconds-block {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            color: var(--primary);
            font-weight: 300;
            width: 60px;
        }

        .period-indicator {
            position: absolute;
            top: 2rem;
            right: 4rem;
            font-family: 'JetBrains Mono';
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        /* Decorative HUD Elements */
        .hud-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            width: 80%;
            left: 10%;
            opacity: 0.3;
        }
        .line-top { top: 1.5rem; }
        .line-bottom { bottom: 1.5rem; }

        .telemetry {
            position: absolute;
            bottom: 2.5rem;
            left: 4rem;
            font-family: 'JetBrains Mono';
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.2);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; filter: brightness(1.5); }
        }

        .pulse { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body>

    <div class="scan-grid"></div>

    <div class="clock-chassis" id="chassis">
        <div class="hud-line line-top"></div>
        
        <div class="period-indicator pulse" id="period">AM</div>

        <div class="time-wrapper">
            <div class="digits" id="time">12:00</div>
            <div class="seconds-block" id="secs">00</div>
        </div>

        <div class="telemetry">
            Temporal.Link: Active<br>
            Zone: <span id="zone">UTC</span>
        </div>

        <div class="hud-line line-bottom"></div>
    </div>

    <script>
        const timeEl = document.getElementById('time');
        const secsEl = document.getElementById('secs');
        const periodEl = document.getElementById('period');
        const chassis = document.getElementById('chassis');
        const zoneEl = document.getElementById('zone');

        // Update Time Logic
        function refreshClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';

            // 12-Hour Conversion
            h = h % 12;
            h = h ? h : 12; // Handle the '0' hour
            const hStr = String(h).padStart(2, '0');

            timeEl.innerText = `${hStr}:${m}`;
            secsEl.innerText = s;
            periodEl.innerText = ampm;
            
            // Get local timezone abbreviation
            const zone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            zoneEl.innerText = zone.split('/').pop().replace('_', ' ');
        }

        // Mouse Parallax
        document.addEventListener('mousemove', (e) => {
            const rotateX = (window.innerHeight / 2 - e.clientY) / 30;
            const rotateY = (e.clientX - window.innerWidth / 2) / 30;
            
            chassis.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // Initialize
        setInterval(refreshClock, 1000);
        refreshClock();
    </script>
</body>
</html>
