<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // CONFIG_MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default System Colors */
            --primary: #ec4899; 
            --secondary: #0ea5e9;
            --bg: #050811;
            --brightness: 1;
        }

        body {
            background-color: var(--bg);
            filter: brightness(var(--brightness));
            color: white;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            transition: filter 0.3s ease;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            background-size: 100% 2px, 3px 100%;
            z-index: 100;
            pointer-events: none;
        }

        .sidebar {
            width: 320px;
            background: rgba(255, 255, 255, 0.02);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            padding: 2rem;
            z-index: 10;
        }

        .glass-kernel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 3rem;
            padding: 5rem;
            text-align: center;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
            transform-style: preserve-3d;
        }

        .main-time {
            font-family: 'Syncopate', sans-serif;
            font-size: 7rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Settings UI Components */
        .config-label { font-size: 8px; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        .color-swatch { width: 100%; height: 30px; border: none; background: none; cursor: pointer; border-radius: 4px; }
        
        .setting-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            appearance: none;
        }

        .btn-reset {
            font-size: 9px;
            color: var(--primary);
            text-decoration: underline;
            cursor: pointer;
            margin-top: 10px;
            display: block;
        }

        .accent-text { color: var(--primary); transition: color 0.3s ease; }
        .accent-bg { background-color: var(--primary); transition: background 0.3s ease; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="mb-10">
            <h2 class="font-bold text-[10px] accent-text tracking-[0.4em] uppercase mb-1">Xclipse_C2</h2>
            <p class="text-[8px] opacity-30">KERNEL_CONFIG_ACTIVE</p>
        </div>

        <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
            <div class="setting-card">
                <label class="config-label">Primary Accent</label>
                <input type="color" id="primaryPicker" value="#ec4899" class="color-swatch">
                
                <div class="mt-4">
                    <label class="config-label">Secondary Accent</label>
                    <input type="color" id="secondaryPicker" value="#0ea5e9" class="color-swatch">
                </div>
            </div>

            <div class="setting-card">
                <label class="config-label">Kernel Brightness</label>
                <input type="range" id="brightRange" min="0.2" max="1.5" step="0.1" value="1">
                
                <div class="mt-4">
                    <label class="config-label">Glass Blur</label>
                    <input type="range" id="blurRange" min="0" max="100" step="1" value="60">
                </div>
            </div>

            <div class="setting-card">
                <label class="config-label">System Presets</label>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <button onclick="setPreset('#ec4899', '#0ea5e9')" class="text-[8px] border border-white/10 py-1 hover:bg-white/5">CYBER_PINK</button>
                    <button onclick="setPreset('#4ade80', '#10b981')" class="text-[8px] border border-white/10 py-1 hover:bg-white/5">EMERALD_NV</button>
                    <button onclick="setPreset('#facc15', '#fb923c')" class="text-[8px] border border-white/10 py-1 hover:bg-white/5">AMBER_WARN</button>
                    <button onclick="setPreset('#ffffff', '#333333')" class="text-[8px] border border-white/10 py-1 hover:bg-white/5">MONO_STARK</button>
                </div>
            </div>

            <span class="btn-reset" onclick="resetSystem()">Factory Reset Kernel</span>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5 text-[8px] opacity-20 font-mono">
            NODE_ID: Bordertown_SA<br>
            LATENCY: <span id="lat">12ms</span>
        </div>
    </aside>

    <main class="flex-1 flex items-center justify-center relative">
        <div class="glass-kernel" id="kernel">
            <div class="accent-bg text-black text-[9px] font-black px-3 py-1 inline-block mb-6 tracking-widest uppercase">
                Temporal_Engine_v4
            </div>
            
            <div class="flex items-baseline justify-center gap-4">
                <h1 class="main-time" id="bt-time">00:00:00</h1>
                <span class="font-display italic text-3xl text-white/20 uppercase" id="bt-ampm">--</span>
            </div>

            <div class="mt-12 flex flex-col items-center">
                <p class="text-[10px] tracking-[1.5em] text-white/20 uppercase mb-4">Chronos Data Uplink</p>
                <div class="w-80 h-[2px] bg-white/5 relative overflow-hidden">
                    <div class="absolute inset-0 accent-bg w-1/3" id="progress"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // DOM Elements
        const timeEl = document.getElementById('bt-time');
        const ampmEl = document.getElementById('bt-ampm');
        const progressEl = document.getElementById('progress');
        const root = document.documentElement;

        // Settings Inputs
        const pPicker = document.getElementById('primaryPicker');
        const sPicker = document.getElementById('secondaryPicker');
        const bRange = document.getElementById('brightRange');
        const blurRange = document.getElementById('blurRange');
        const kernel = document.getElementById('kernel');

        // Color Update Logic
        pPicker.oninput = (e) => root.style.setProperty('--primary', e.target.value);
        sPicker.oninput = (e) => root.style.setProperty('--secondary', e.target.value);
        bRange.oninput = (e) => root.style.setProperty('--brightness', e.target.value);
        blurRange.oninput = (e) => kernel.style.backdropFilter = `blur(${e.target.value}px)`;

        function setPreset(p, s) {
            root.style.setProperty('--primary', p);
            root.style.setProperty('--secondary', s);
            pPicker.value = p;
            sPicker.value = s;
        }

        function resetSystem() {
            setPreset('#ec4899', '#0ea5e9');
            root.style.setProperty('--brightness', '1');
            bRange.value = 1;
            kernel.style.backdropFilter = `blur(60px)`;
            blurRange.value = 60;
        }

        // Clock Engine
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-AU', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', 
                hour12: true, timeZone: 'Australia/Adelaide' 
            });
            const [time, ampm] = timeStr.split(' ');
            timeEl.innerText = time;
            ampmEl.innerText = ampm;

            const secondsPassed = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
            progressEl.style.width = `${(secondsPassed / 86400) * 100}%`;

            document.getElementById('lat').innerText = `${Math.floor(Math.random() * 10 + 10)}ms`;
            requestAnimationFrame(updateClock);
        }

        // Parallax
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 60;
            const y = (window.innerHeight / 2 - e.clientY) / 60;
            kernel.style.transform = `rotateX(${y}deg) rotateY(${-x}deg)`;
        });

        updateClock();
    </script>
</body>
</html>
